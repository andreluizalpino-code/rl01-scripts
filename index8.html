<title>Revenue Lab &middot; Material protegido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,300&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  body{
    background:#0B1B2E;color:#F7F4EE;
    font-family:'Inter',system-ui,sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;text-rendering:optimizeLegibility;
  }
  .gate{
    background:#F7F4EE;color:#0B1B2E;
    border-radius:16px;padding:42px 38px 36px;
    width:100%;max-width:392px;
    box-shadow:0 18px 50px rgba(0,0,0,.4);
    text-align:center;
  }
  .wordmark{
    font-family:'Fraunces',serif;font-size:27px;font-weight:600;
    letter-spacing:-.01em;margin-bottom:6px;
  }
  .wordmark em{font-weight:300;font-style:italic;}
  .slogan{
    font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    color:#CAA557;margin-bottom:28px;
  }
  .lock{
    font-size:14px;color:#54606e;line-height:1.55;margin-bottom:22px;
  }
  .lock strong{color:#0B1B2E;font-weight:600;}
  label{
    display:block;text-align:left;font-size:12px;font-weight:600;
    letter-spacing:.1em;text-transform:uppercase;color:#54606e;margin-bottom:7px;
  }
  input{
    width:100%;font-family:'Inter',sans-serif;font-size:16px;
    padding:13px 15px;border:1px solid #d8cfbb;border-radius:10px;
    background:#fff;color:#0B1B2E;outline:none;
  }
  input:focus{border-color:#CAA557;box-shadow:0 0 0 3px rgba(202,165,87,.18);}
  button{
    width:100%;margin-top:16px;font-family:'Inter',sans-serif;
    font-size:15px;font-weight:600;
    padding:13px;border:none;border-radius:10px;cursor:pointer;
    background:#0B1B2E;color:#F7F4EE;transition:opacity .15s ease;
  }
  button:hover{opacity:.88;}
  button:disabled{opacity:.5;cursor:default;}
  .err{
    min-height:18px;margin-top:13px;font-size:13.5px;
    color:#b3261e;font-weight:500;
  }
  .foot{
    margin-top:24px;font-size:12px;color:#8a8275;
    border-top:1px solid #e4ddcf;padding-top:16px;
  }
</style>
</head>
<body>
  <main class="gate">
    <div class="wordmark">Revenue <em>Lab</em></div>
    <div class="slogan">Receita como sistema.</div>
    <p class="lock">Este material &eacute; <strong>confidencial</strong>. Digite a senha do projeto para abrir.</p>
    <label for="pw">Senha de acesso</label>
    <input id="pw" type="password" autocomplete="off" placeholder="Senha do projeto">
    <button id="btn" type="button">Abrir</button>
    <div class="err" id="err"></div>
    <div class="foot">RL01.2026 &middot; Dra. Anna Olivieri &middot; uso interno</div>
  </main>

function b64(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
async function abrir(){
  var pw=document.getElementById('pw').value;
  var err=document.getElementById('err');
  var btn=document.getElementById('btn');
  err.textContent='';
  if(!pw){err.textContent='Digite a senha.';return;}
  btn.disabled=true;btn.textContent='Abrindo...';
  try{
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.s),iterations:P.n,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.i)},key,b64(P.d));
    var html=new TextDecoder().decode(plain);
    document.open();document.write(html);document.close();
  }catch(e){
    btn.disabled=false;btn.textContent='Abrir';
    err.textContent='Senha incorreta. Tente novamente.';
  }
}
document.addEventListener('DOMContentLoaded',function(){
  var pw=document.getElementById('pw');
  pw.addEventListener('keydown',function(e){if(e.key==='Enter')abrir();});
  document.getElementById('btn').addEventListener('click',abrir);
  pw.focus();
});
</script>
